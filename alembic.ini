# Alembic migration configuration
# The actual DB URL is loaded from DATABASE_URL env var at runtime.
# This fallback is only used if the env var is not set.

[alembic]
script_location = cortexia/db/migrations
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/cortexia

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
