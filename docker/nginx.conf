# ─────────────────────────────────────────────────────────
# CORTEXIA — Nginx reverse proxy (edge gateway)
# ─────────────────────────────────────────────────────────

upstream api_backend {
    server api:8000;
}

upstream dashboard_frontend {
    server dashboard:80;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API proxy
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML processing
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket proxy for live streaming
    location /api/v1/streams/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Upload endpoints (stricter rate limit)
    location ~ ^/api/v1/(recognize|identities/.*/faces|forensics/) {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Dashboard (React SPA)
    location / {
        proxy_pass http://dashboard_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check endpoint (no rate limit)
    location = /health {
        proxy_pass http://api_backend;
    }

    # Docs endpoint
    location /docs {
        proxy_pass http://api_backend;
    }
    location /redoc {
        proxy_pass http://api_backend;
    }
    location /openapi.json {
        proxy_pass http://api_backend;
    }
}
